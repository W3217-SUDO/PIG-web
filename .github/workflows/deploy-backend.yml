name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: install
        run: npm ci

      - name: build
        run: npm -w backend run build
        continue-on-error: true

      - name: archive
        run: |
          if [ -d backend/dist ]; then
            tar czf release.tar.gz \
              package.json \
              package-lock.json \
              backend/dist \
              backend/package.json \
              backend/db 2>/dev/null || tar czf release.tar.gz package.json package-lock.json backend/package.json
          else
            echo "no dist yet, skip deploy"
            exit 0
          fi

      - name: upload + reload
        if: success()
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$SSH_HOST" || { echo "::error::Missing GitHub secret SSH_HOST"; exit 1; }
          test -n "$SSH_KEY" || { echo "::error::Missing GitHub secret SSH_KEY"; exit 1; }

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/pig_deploy_key
          chmod 600 ~/.ssh/pig_deploy_key
          ssh-keygen -y -f ~/.ssh/pig_deploy_key > /dev/null
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

          scp -i ~/.ssh/pig_deploy_key release.tar.gz "ubuntu@$SSH_HOST:/tmp/release.tar.gz"
          ssh -i ~/.ssh/pig_deploy_key "ubuntu@$SSH_HOST" 'bash -s' <<'REMOTE'
            set -euo pipefail
            cd /opt/pig
            TS=$(date +%Y%m%d_%H%M%S)
            mkdir -p releases/$TS
            tar xzf /tmp/release.tar.gz -C releases/$TS
            cd releases/$TS
            npm ci --omit=dev --workspace backend
            [ -f /opt/pig/shared/.env.production ] && ln -sfn /opt/pig/shared/.env.production backend/.env.production
            cd /opt/pig
            ln -sfn releases/$TS current
            cd current/backend
            npm run migration:run 2>/dev/null || echo "no migrations"
            pm2 reload pig-backend --update-env 2>/dev/null || pm2 start dist/main.js --name pig-backend --update-env
            sleep 3
            curl -fsS http://127.0.0.1:3000/api/health || { pm2 logs pig-backend --lines 50 --nostream; exit 1; }
            cd /opt/pig/releases
            ls -1t | tail -n +6 | xargs -r rm -rf
          REMOTE
