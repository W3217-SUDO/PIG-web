name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'package.json'
      - 'package-lock.json'
      - 'infra/deploy/**'
      - 'infra/monitor/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: install
        run: npm ci

      - name: build
        run: npm -w backend run build

      - name: archive
        run: |
          if [ -d backend/dist ]; then
            tar czf release.tar.gz \
              package.json \
              package-lock.json \
              backend/dist \
              backend/package.json \
              backend/db \
              infra/deploy/ecosystem.config.cjs \
              infra/deploy/render-env-production.sh \
              infra/deploy/logrotate-pig.conf \
              infra/monitor/pig-health-alert.sh 2>/dev/null || tar czf release.tar.gz package.json package-lock.json backend/package.json
          else
            echo "no dist yet, skip deploy"
            exit 0
          fi

      - name: upload + reload
        if: success()
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          GIT_COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          test -n "$SSH_HOST" || { echo "::error::Missing GitHub secret SSH_HOST"; exit 1; }
          test -n "$SSH_KEY" || { echo "::error::Missing GitHub secret SSH_KEY"; exit 1; }

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/pig_deploy_key
          chmod 600 ~/.ssh/pig_deploy_key
          ssh-keygen -y -f ~/.ssh/pig_deploy_key > /dev/null
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

          scp -i ~/.ssh/pig_deploy_key release.tar.gz "ubuntu@$SSH_HOST:/tmp/release.tar.gz"
          ssh -i ~/.ssh/pig_deploy_key "ubuntu@$SSH_HOST" "NODE_ENV=production GIT_COMMIT=$GIT_COMMIT bash -s" <<'REMOTE'
            set -euo pipefail
            export NODE_ENV="${NODE_ENV:-production}"
            export GIT_COMMIT="${GIT_COMMIT:-unknown}"
            cd /opt/pig
            TS=$(date +%Y%m%d_%H%M%S)
            mkdir -p releases/$TS
            tar xzf /tmp/release.tar.gz -C releases/$TS
            cd releases/$TS
            npm ci --omit=dev --workspace backend
            bash infra/deploy/render-env-production.sh
            [ -f /opt/pig/shared/.env.production ] && ln -sfn /opt/pig/shared/.env.production backend/.env.production
            cd /opt/pig
            ln -sfn releases/$TS current
            cd current/backend
            NODE_ENV=production npm run migration:run 2>/dev/null || echo "no migrations"
            sudo install -m 644 -o root -g root /opt/pig/current/infra/deploy/logrotate-pig.conf /etc/logrotate.d/pig
            sudo logrotate -d /etc/logrotate.d/pig >/dev/null
            sudo install -m 755 -o root -g root /opt/pig/current/infra/monitor/pig-health-alert.sh /opt/pig/bin/pig-health-alert.sh
            (crontab -l 2>/dev/null | grep -v '/opt/pig/bin/pig-health-alert.sh'; echo '* * * * * /opt/pig/bin/pig-health-alert.sh >> /opt/pig/logs/pig-health-alert.log 2>&1') | crontab -
            pm2 delete pig-backend 2>/dev/null || true
            NODE_ENV=production GIT_COMMIT="$GIT_COMMIT" PM2_INSTANCES="${PM2_INSTANCES:-2}" \
              pm2 start /opt/pig/current/infra/deploy/ecosystem.config.cjs --update-env
            pm2 save
            sleep 3
            HEALTH_JSON=$(curl -fsS http://127.0.0.1:3000/api/health) || { pm2 logs pig-backend --lines 50 --nostream; exit 1; }
            HEALTH_JSON="$HEALTH_JSON" node -e "const h=JSON.parse(process.env.HEALTH_JSON).data; if(h.commit!==process.env.GIT_COMMIT){console.error('health commit mismatch', h.commit, process.env.GIT_COMMIT); process.exit(1)} if(h.system?.backup?.status!=='ok'){console.error('backup health not ok', h.system?.backup); process.exit(1)}"
            cd /opt/pig/releases
            ls -1t | tail -n +6 | xargs -r rm -rf
          REMOTE
