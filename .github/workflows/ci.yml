name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: install
        run: npm ci

      - name: lint
        run: npm run lint || echo "skip-if-not-configured"

      - name: backend build
        run: npm -w backend run build || echo "skip-if-not-configured"
        continue-on-error: true

      - name: frontend type-check
        run: npm -w frontend run type-check || echo "skip-if-not-configured"
        continue-on-error: true

      - name: audit
        run: npm audit --audit-level=high --workspaces=false || true

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_pass
          MYSQL_DATABASE: pig_test
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping" --health-interval=10s
          --health-timeout=5s --health-retries=15
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping" --health-interval=10s
          --health-timeout=5s --health-retries=10
    env:
      NODE_ENV: test
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: ci_pass
      DB_NAME: pig_test
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      JWT_SECRET: ci_secret_with_at_least_32_characters_xxxx
      WX_MP_APPID: wx_ci_placeholder
      WX_MP_SECRET: ci_placeholder
      LOG_LEVEL: warn
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: backend tests
        run: npm -w backend run test || echo "skip-if-no-tests-yet"
        continue-on-error: true
