<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>私人订猪 · 完整原型</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  min-height:100vh;
  background:linear-gradient(135deg,#d4d4d4 0%,#e8e8e8 50%,#cfcfcf 100%);
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;
  display:flex;flex-direction:column;align-items:center;
}

/* 顶部栏 */
.top-bar{
  width:100%;height:60px;background:#fff;
  box-shadow:0 1px 12px rgba(0,0,0,0.1);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 36px;position:sticky;top:0;z-index:200;
}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{font-size:28px;}
.logo-text{font-size:17px;font-weight:800;color:#1a6b35;}
.logo-sub{font-size:11px;color:#aaa;margin-top:1px;}

.nav-tabs{display:flex;gap:10px;}
.nav-btn{
  height:36px;padding:0 22px;border-radius:18px;
  border:2px solid #2d8a4e;background:transparent;
  color:#2d8a4e;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .2s;outline:none;
}
.nav-btn:hover{background:#f0faf4;}
.nav-btn.active{background:#2d8a4e;color:#fff;}

.sync-badge{
  display:flex;align-items:center;gap:6px;
  background:#f0faf4;border:1px solid #b7e5c8;
  border-radius:20px;padding:4px 14px;
  font-size:12px;color:#2d8a4e;
}
.sync-dot{width:7px;height:7px;background:#52c41a;border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.8);}}
.sync-badge.offline{background:#fff2f0;border-color:#ffc9c9;color:#cf1322;}
.sync-badge.offline .sync-dot{background:#ff4d4f;animation:none;}

/* 主体 */
.main{display:flex;justify-content:center;padding:36px 20px 60px;width:100%;}

/* 手机外壳 */
.phone-wrap{display:flex;flex-direction:column;align-items:center;}
.phone-frame{
  position:relative;width:390px;height:820px;
  background:#0d0d0d;border-radius:56px;
  box-shadow:0 0 0 2px #2a2a2a,0 0 0 9px #111,0 40px 100px rgba(0,0,0,0.5);
  overflow:hidden;flex-shrink:0;
}
.pb-r{position:absolute;right:-4px;top:150px;width:4px;height:75px;background:#222;border-radius:2px 0 0 2px;}
.pb-l1{position:absolute;left:-4px;top:115px;width:4px;height:40px;background:#222;border-radius:0 2px 2px 0;}
.pb-l2{position:absolute;left:-4px;top:170px;width:4px;height:65px;background:#222;border-radius:0 2px 2px 0;}
.pb-l3{position:absolute;left:-4px;top:250px;width:4px;height:65px;background:#222;border-radius:0 2px 2px 0;}

.notch{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:126px;height:34px;background:#0d0d0d;
  border-radius:0 0 26px 26px;z-index:30;
  display:flex;align-items:center;justify-content:space-between;padding:6px 14px 6px 16px;
}
.notch-cam{width:12px;height:12px;background:#1a1a1a;border-radius:50%;border:2px solid #2d2d2d;}
.notch-sp{width:62px;height:5px;background:#1a1a1a;border-radius:3px;}

.statusbar{
  position:absolute;top:0;left:0;right:0;height:44px;z-index:20;
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:0 18px 5px;pointer-events:none;
}
.sb-time{font-size:15px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.6);}
.sb-icons{display:flex;gap:4px;align-items:center;}
.sb-icon{font-size:11px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.6);}

.phone-screen{position:absolute;inset:0;border-radius:56px;overflow:hidden;background:#fff;}

/* iframe */
.phone-screen iframe{
  width:390px;height:820px;border:none;display:block;
  /* 模拟顶部状态栏偏移 */
  margin-top:0;
}

/* 离线遮罩 */
.offline-mask{
  position:absolute;inset:0;border-radius:56px;background:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;z-index:50;
}
.offline-mask.hidden{display:none;}
.om-pig{font-size:56px;animation:bounce 1.2s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.om-title{font-size:16px;font-weight:700;color:#333;}
.om-sub{font-size:12px;color:#999;text-align:center;line-height:1.8;padding:0 30px;}
.om-code{background:#f5f5f5;border-radius:8px;padding:4px 12px;font-family:monospace;font-size:12px;color:#555;}
.om-btn{
  margin-top:8px;background:#2d8a4e;color:#fff;border:none;
  border-radius:24px;padding:10px 28px;font-size:14px;
  font-weight:700;cursor:pointer;
}
.om-btn:hover{background:#1a6b35;}

/* 手机下标签 */
.phone-label{margin-top:18px;text-align:center;}
.pl-name{font-size:14px;font-weight:700;color:#333;}
.pl-path{font-size:11px;color:#aaa;margin-top:3px;font-family:monospace;}
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo">
    <span class="logo-icon">🐷</span>
    <div>
      <div class="logo-text">私人订猪</div>
      <div class="logo-sub">完整原型预览 · H5 实时同步</div>
    </div>
  </div>

  <div class="nav-tabs">
    <button class="nav-btn active" onclick="goSection('client',this)">客户端</button>
    <button class="nav-btn" onclick="goSection('foster',this)">代养人端</button>
    <button class="nav-btn" onclick="goSection('admin',this)">管理端</button>
  </div>

  <div class="sync-badge" id="syncBadge">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncText">检测中…</span>
  </div>
</div>

<div class="main">
<div class="phone-wrap">
  <div class="phone-frame">
    <div class="pb-r"></div><div class="pb-l1"></div>
    <div class="pb-l2"></div><div class="pb-l3"></div>
    <div class="notch"><div class="notch-cam"></div><div class="notch-sp"></div></div>
    <div class="statusbar">
      <span class="sb-time" id="clockEl">15:00</span>
      <div class="sb-icons">
        <span class="sb-icon">●●●</span>
        <span class="sb-icon">WiFi</span>
        <span class="sb-icon">🔋</span>
      </div>
    </div>

    <div class="phone-screen">
      <iframe id="appFrame"
        src="about:blank"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-top-navigation">
      </iframe>

      <!-- 离线遮罩 -->
      <div class="offline-mask" id="offlineMask">
        <div class="om-pig">🐷</div>
        <div class="om-title">H5 服务器未启动</div>
        <div class="om-sub">
          请先双击运行启动脚本：<br>
          <span class="om-code">demo/start.bat</span><br>
          等待 5 秒后点击重新连接
        </div>
        <button class="om-btn" onclick="retry()">重新连接</button>
      </div>
    </div>
  </div>

  <div class="phone-label">
    <div class="pl-name" id="labelName">客户端 · 首页</div>
    <div class="pl-path" id="labelPath">localhost:5173/#/pages/index/index</div>
  </div>
</div>
</div>

<script>
const BASE = 'http://localhost:5173';
const sections = {
  client:  { name:'客户端 · 首页',    path:'pages/index/index',           label:'客户端' },
  foster:  { name:'代养人端 · 登录',  path:'pages/foster/login/index',     label:'代养人端' },
  admin:   { name:'管理端 · 数据中心', path:'pages/foster/admin/index',     label:'管理端' },
};

let currentSection = 'client';
let serverOk = false;

// 时钟
function tick(){
  const n=new Date();
  document.getElementById('clockEl').textContent=
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}
tick(); setInterval(tick,10000);

// 检测服务器
async function checkServer(){
  try{
    await fetch(BASE+'/',{method:'HEAD',mode:'no-cors',signal:AbortSignal.timeout(3000)});
    return true;
  }catch{return false;}
}

async function updateStatus(){
  const ok = await checkServer();
  serverOk = ok;
  const badge=document.getElementById('syncBadge');
  const text=document.getElementById('syncText');
  const mask=document.getElementById('offlineMask');
  if(ok){
    badge.className='sync-badge';
    text.textContent='实时同步中';
    mask.className='offline-mask hidden';
    // 如果 iframe 还是 about:blank，加载对应页面
    const frame=document.getElementById('appFrame');
    if(frame.src==='about:blank'||frame.src===window.location.href){
      loadSection(currentSection);
    }
  }else{
    badge.className='sync-badge offline';
    text.textContent='未连接';
    mask.className='offline-mask';
  }
}

function loadSection(key){
  const s=sections[key];
  const url=BASE+'/#/'+s.path;
  document.getElementById('appFrame').src=url;
  document.getElementById('labelName').textContent=s.name;
  document.getElementById('labelPath').textContent='localhost:5173/#/'+s.path;
}

function goSection(key,btn){
  currentSection=key;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(serverOk) loadSection(key);
}

function retry(){
  document.getElementById('offlineMask').innerHTML=`
    <div style="font-size:56px;animation:bounce 1.2s infinite">🐷</div>
    <div style="font-size:16px;font-weight:700;color:#333">正在连接…</div>
  `;
  setTimeout(updateStatus, 800);
}

// 初始化
updateStatus();
setInterval(updateStatus, 20000);
</script>
</body>
</html>
