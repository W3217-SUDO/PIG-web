# PIG 本地开发依赖：MySQL 8 + Redis 7
# 版本号与服务器 (175.24.175.123) 精确对齐
# 启动：  docker compose up -d
# 停止：  docker compose down
# 查看日志：docker compose logs -f mysql
# 清空数据：docker compose down -v   (会删 named volumes)

services:
  mysql:
    image: mysql:8.0.45
    container_name: pig-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASS}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pig}
      MYSQL_USER: ${MYSQL_APP_USER:-pig_app}
      MYSQL_PASSWORD: ${MYSQL_APP_PASS}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --skip-host-cache
      - --skip-name-resolve
    ports:
      # 只绑本机回环，局域网/外网访问不到
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  redis:
    image: redis:7.0.15
    container_name: pig-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASS}
      - --appendonly
      - "yes"
      - --maxmemory-policy
      - allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASS\" --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    environment:
      REDIS_PASS: ${REDIS_PASS}
      TZ: Asia/Shanghai

volumes:
  mysql_data:
    name: pig_mysql_data
  redis_data:
    name: pig_redis_data
